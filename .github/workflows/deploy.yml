name: deploy

permissions:
  contents: read

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: deploy
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          service_account: "github-ci@all-o-stasis.iam.gserviceaccount.com"
          workload_identity_provider: "projects/146982620019/locations/global/workloadIdentityPools/github-pool/providers/github-provider"

      - name: Cloud SDK
        uses: "google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db" # v3.0.1

      - name: install nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: build/push docker
        run: |
          BRANCH=${GITHUB_REF##*/}
          IMAGE=europe-west1-docker.pkg.dev/all-o-stasis/all-o-stasis/api:${BRANCH}
          nix build
          TAG=$(docker load < result | awk '{print $3}')
          gcloud auth configure-docker europe-west1-docker.pkg.dev
          docker tag $TAG $IMAGE
          docker push $IMAGE

      - name: deploy
        env:
          MAILEROO_API_KEY: ${{ secrets.MAILEROO_API_KEY }}
        run: |
          BRANCH=${GITHUB_REF##*/}
          IMAGE=europe-west1-docker.pkg.dev/all-o-stasis/all-o-stasis/api:${BRANCH}
          # TODO adapt to branch and add dev/staging?
          CLOUD_RUN_SERVICE_NAME="api"

          gcloud --project all-o-stasis run deploy $CLOUD_RUN_SERVICE_NAME --image=$IMAGE --region=europe-west1 --set-env-vars MAILEROO_API_KEY=$MAILEROO_API_KEY
